name: evals

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: legal_tool
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/legal_tool
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EVALS_JUDGE_MODEL: claude-sonnet-4-6
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed eval corpus
        run: |
          python -m evals.seed_test_corpus --clear

      - name: Run full evals
        run: |
          python -m evals.run_evals --output evals/results.full.json --mode full --fail-under 0.8

      - name: Run baseline evals
        run: |
          python -m evals.run_evals --output evals/results.baseline.json --mode baseline --fail-under 0

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            evals/results.full.json
            evals/results.baseline.json

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const fullPath = 'evals/results.full.json';
            const baselinePath = 'evals/results.baseline.json';
            if (!fs.existsSync(fullPath) || !fs.existsSync(baselinePath)) {
              core.info('Missing results file(s); skipping comment.');
              return;
            }
            const full = JSON.parse(fs.readFileSync(fullPath, 'utf8')).summary;
            const baseline = JSON.parse(fs.readFileSync(baselinePath, 'utf8')).summary;
            const body = [
              '## Eval results',
              '',
              `- Full agent policy compliance: **${(full.policy_pass_rate * 100).toFixed(1)}%**`,
              `- Full agent citation accuracy: **${(full.citation_pass_rate * 100).toFixed(1)}%**`,
              `- Baseline policy compliance: **${(baseline.policy_pass_rate * 100).toFixed(1)}%**`,
              `- Baseline citation accuracy: **${(baseline.citation_pass_rate * 100).toFixed(1)}%**`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const sha = context.sha;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: sha });
            if (!prs.data.length) {
              core.info('No associated PR found for this commit.');
              return;
            }

            const pr = prs.data[0];
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body,
            });
