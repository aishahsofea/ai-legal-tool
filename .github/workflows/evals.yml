name: evals

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: legal_tool
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/legal_tool
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EVALS_JUDGE_MODEL: claude-haiku-4-5-20251001
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed eval corpus
        run: |
          python -m evals.seed_test_corpus --clear

      - name: Run smoke evals
        run: |
          python -m evals.run_evals --output evals/results.full.json --mode full --smoke --fail-under 0.8

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results.full.json

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const fullPath = 'evals/results.full.json';
            if (!fs.existsSync(fullPath)) {
              core.info('Missing results file; skipping comment.');
              return;
            }
            const full = JSON.parse(fs.readFileSync(fullPath, 'utf8')).summary;
            const fmtRate = (r) => r != null ? `${(r * 100).toFixed(1)}%` : 'n/a';
            const body = [
              '## Eval results (smoke — 15 cases)',
              '',
              `- Judge pass rate: **${fmtRate(full.judge_pass_rate)}** (${full.judge_passed}/${full.judge_total})`,
              `- L1 citation existence: **${fmtRate(full.l1?.citation_existence?.rate)}**`,
              `- L1 language register: **${fmtRate(full.l1?.language_register?.rate)}**`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const sha = context.sha;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: sha });
            if (!prs.data.length) {
              core.info('No associated PR found for this commit.');
              return;
            }

            const pr = prs.data[0];
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body,
            });
